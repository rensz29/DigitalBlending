<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Blending</title>
    <meta
      name="description"
      content="Digital Blending — shift analytics and live OPC UA tag monitoring"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2338bdf8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 2 3 7v10l9 5 9-5V7z'/%3E%3Cpath d='M12 22V12'/%3E%3Cpath d='m3 7 9 5 9-5'/%3E%3C/svg%3E"
    />
    <script>
      // Apply saved/preferred theme before paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('dt-theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
